name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'

# Solves the Node.js 20 deprecation warning for 2026
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # Tells uv where to look for your lockfile or requirements
          cache-dependency-glob: "web/requirements.txt" 
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./web
        # Installing to the system path of the runner is often more stable for simple CI tasks
        run: |
          uv pip install --system mkdocs mkdocs-material mkdocs-minify-plugin

      - name: Build site
        working-directory: ./web
        # Run mkdocs directly since we installed it to the runner's system path
        run: mkdocs build --site-dir ../site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
